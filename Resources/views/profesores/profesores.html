<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión de Horarios - Profesores</title>
    <style>
        /* Estilos Base */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', system-ui, sans-serif;
        }

        body {
            background-color: #f1f5f9;
            color: #1e293b;
            padding: 2rem;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: 350px 1fr;
            gap: 2rem;
        }

        @media (max-width: 768px) {
            .container {
                grid-template-columns: 1fr;
            }
        }

        /* Tarjetas */
        .card {
            background: #ffffff;
            padding: 1.5rem;
            border-radius: 8px;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05), 0 2px 4px -1px rgba(0,0,0,0.03);
        }

        h2 {
            margin-bottom: 1.5rem;
            color: #0f172a;
            font-size: 1.25rem;
            border-bottom: 2px solid #e2e8f0;
            padding-bottom: 0.5rem;
        }

        /* Formularios */
        .form-group {
            margin-bottom: 1rem;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 600;
            font-size: 0.85rem;
            color: #475569;
        }

        .form-group input, .form-group select {
            width: 100%;
            padding: 0.6rem;
            border: 1px solid #cbd5e1;
            border-radius: 6px;
            font-size: 0.95rem;
            outline: none;
        }

        .form-group input:focus, .form-group select:focus {
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.15);
        }

        button {
            width: 100%;
            background-color: #2563eb;
            color: white;
            border: none;
            padding: 0.75rem;
            font-size: 0.95rem;
            font-weight: 600;
            border-radius: 6px;
            cursor: pointer;
            transition: background 0.2s;
        }

        button:hover {
            background-color: #1d4ed8;
        }

        /* Tablas */
        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
        }

        th, td {
            padding: 0.75rem 1rem;
            border-bottom: 1px solid #e2e8f0;
        }

        th {
            background-color: #f8fafc;
            color: #64748b;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        tr:hover {
            background-color: #f8fafc;
        }

        .btn-delete {
            background-color: #ef4444;
            padding: 0.4rem 0.75rem;
            font-size: 0.85rem;
            width: auto;
            display: inline-block;
        }

        .btn-delete:hover {
            background-color: #dc2626;
        }

        .no-data {
            text-align: center;
            color: #64748b;
            padding: 2rem;
        }
    </style>
</head>
<body>

    <h1 style="text-align: center; margin-bottom: 2rem; color: #0f172a;">Control de Horarios Docentes</h1>

    <div class="container">
        
        <!-- Formulario de Registro -->
        <aside class="card">
            <h2>Asignar Horario</h2>
            <form id="horarioForm">
                <div class="form-group">
                    <label for="profesor_nombre">Nombre del Profesor</label>
                    <input type="text" id="profesor_nombre" required placeholder="Ej. Dr. Armando Casas">
                </div>

                <div class="form-group">
                    <label for="materia">Materia / Asignatura</label>
                    <input type="text" id="materia" required placeholder="Ej. Programación Web">
                </div>

                <div class="form-group">
                    <label for="dia_semana">Día de la Semana</label>
                    <select id="dia_semana" required>
                        <option value="Lunes">Lunes</option>
                        <option value="Martes">Martes</option>
                        <option value="Miércoles">Miércoles</option>
                        <option value="Jueves">Jueves</option>
                        <option value="Viernes">Viernes</option>
                        <option value="Sábado">Sábado</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="hora_inicio">Hora de Inicio</label>
                    <input type="time" id="hora_inicio" required>
                </div>

                <div class="form-group">
                    <label for="hora_fin">Hora de Fin</label>
                    <input type="time" id="hora_fin" required>
                </div>

                <button type="submit">Registrar Horario</button>
            </form>
        </aside>

        <!-- Tabla de Visualización -->
        <main class="card" style="overflow-x: auto;">
            <h2>Horarios Registrados</h2>
            <table>
                <thead>
                    <tr>
                        <th>Profesor</th>
                        <th>Materia</th>
                        <th>Día</th>
                        <th>Horario</th>
                        <th>Acciones</th>
                    </tr>
                </thead>
                <tbody id="tablaHorarios">
                    <!-- Los datos de la base de datos se cargarán aquí dinámicamente -->
                </tbody>
            </table>
        </main>

    </div>

    <script>
        // URL de tu controlador PHP
        const API_URL = 'HorarioController.php';

        // Cargar horarios al abrir la página
        document.addEventListener('DOMContentLoaded', cargarHorarios);

        // Evento para capturar el envío del formulario (CREATE)
        document.getElementById('horarioForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const datos = {
                profesor_nombre: document.getElementById('profesor_nombre').value,
                materia: document.getElementById('materia').value,
                dia_semana: document.getElementById('dia_semana').value,
                hora_inicio: document.getElementById('hora_inicio').value,
                hora_fin: document.getElementById('hora_fin').value
            };

            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(datos)
                });

                if (response.ok) {
                    alert('Horario guardado correctamente');
                    document.getElementById('horarioForm').reset();
                    cargarHorarios(); // Recargar la tabla
                } else {
                    alert('Error al guardar el horario');
                }
            } catch (error) {
                console.error('Error:', error);
            }
        });

        // Función para listar los horarios (READ)
        async function cargarHorarios() {
            const tbody = document.getElementById('tablaHorarios');
            tbody.innerHTML = '<tr><td colspan="5" class="no-data">Cargando horarios...</td></tr>';

            try {
                const response = await fetch(API_URL);
                const horarios = await response.json();

                tbody.innerHTML = ''; // Limpiar indicador de carga

                if (horarios.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="5" class="no-data">No hay horarios registrados aún.</td></tr>';
                    return;
                }

                horarios.forEach(h => {
                    const fila = document.createElement('tr');
                    fila.innerHTML = `
                        <td><strong>${h.profesor_nombre}</strong></td>
                        <td>${h.materia}</td>
                        <td>${h.dia_semana}</td>
                        <td>${h.hora_inicio.substring(0,5)} - ${h.hora_fin.substring(0,5)}</td>
                        <td>
                            <button class="btn-delete" onclick="eliminarHorario(${h.id})">Eliminar</button>
                        </td>
                    `;
                    tbody.appendChild(fila);
                });
            } catch (error) {
                tbody.innerHTML = '<tr><td colspan="5" class="no-data" style="color:red;">Error al conectar con el servidor.</td></tr>';
                console.error('Error:', error);
            }
        }

        // Función para eliminar un horario (DELETE)
        async function eliminarHorario(id) {
            if (!confirm('¿Estás seguro de que deseas eliminar este horario?')) return;

            try {
                const response = await fetch(`${API_URL}?id=${id}`, {
                    method: 'DELETE'
                });

                if (response.ok) {
                    cargarHorarios(); // Recargar la tabla
                } else {
                    alert('No se pudo eliminar el registro');
                }
            } catch (error) {
                console.error('Error:', error);
            }
        }
    </script>
</body>
</html>
